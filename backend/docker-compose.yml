version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: vidra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  backend:
    build: .
    container_name: vidra-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secure_vidra_jwt_secret_change_me_in_production
      - DOWNLOADS_DIR=/usr/src/app/temp_downloads
      - PUBLIC_HOST=http://localhost:3000
    depends_on:
      - redis
    volumes:
      - temp-downloads:/usr/src/app/temp_downloads
    restart: always

volumes:
  redis-data:
  temp-downloads:
